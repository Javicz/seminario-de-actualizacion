<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
</head>
<body>   
</body>
<script>
class Chat extends HTMLElement {
    constructor() {
        super();
        this.attachShadow({ mode: 'open' });

        // ===== ELEMENTOS =====
        this._input = document.createElement('input');
        this._btnEnviar = document.createElement('button');
        this._contenedor = document.createElement('div');
        this._contenedorMensajes = document.createElement('div');
        this._indexRespuesta = 0;
        this._mensajes = [];

        // ===== RESPUESTAS AUTOMÁTICAS =====
        this._respuestas = [
            '¡Hola! ¿Cómo estás?',
            'Todo bien por acá, ¿y vos?',
            'Me alegra escuchar eso.',
            '¿Qué estás haciendo?',
            'Suena interesante, cuéntame más.',
            '¡Qué buena idea!',
            'No sabía eso, gracias por contarme.',
            'Jaja, me hiciste reír.',
            '¿Viste la última película?',
            'Tengo que irme, hablamos luego.'
        ];

        // ===== CONFIGURAR ELEMENTOS =====
        this._input.type = 'text';
        this._input.placeholder = 'Escribe un mensaje...';
        this._btnEnviar.textContent = '→';

        // ===== ESTILOS =====
        var style = document.createElement('style');
        style.textContent = `
            :host {
                display: block;
                font-family: Arial, sans-serif;
            }
            .chat-container {
                width: 400px;
                margin: 30px auto;
                border: 1px solid #ccc;
                border-radius: 10px;
                padding: 10px;
                background-color: #ece5dd;
                display: flex;
                flex-direction: column;
            }
            .messages-container {
                height: 400px;
                overflow-y: auto;
                display: flex;
                flex-direction: column;
                gap: 10px;
                padding: 5px;
            }
            .input-area {
                display: flex;
                gap: 8px;
                margin-top: 10px;
            }
            .input-area input {
                flex: 1;
                padding: 10px;
                border-radius: 20px;
                border: none;
                outline: none;
                font-size: 14px;
            }
            .input-area button {
                padding: 10px 18px;
                border: none;
                border-radius: 20px;
                background-color: #128C7E;
                color: white;
                cursor: pointer;
                font-size: 18px;
            }
            .input-area button:hover {
                background-color: #0d6b60;
            }
            .message {
                padding: 10px 14px;
                border-radius: 10px;
                max-width: 70%;
                margin: 0;
                word-wrap: break-word;
            }
            .message.own {
                align-self: flex-end;
                background-color: #DCF8C6;
            }
            .message.other {
                align-self: flex-start;
                background-color: white;
            }
            /* Scroll personalizado */
            .messages-container::-webkit-scrollbar {
                width: 6px;
            }
            .messages-container::-webkit-scrollbar-track {
                background: #f1f1f1;
                border-radius: 10px;
            }
            .messages-container::-webkit-scrollbar-thumb {
                background: #888;
                border-radius: 10px;
            }
            .messages-container::-webkit-scrollbar-thumb:hover {
                background: #555;
            }
        `;
        this.shadowRoot.appendChild(style);

        // ===== CONTENEDOR PRINCIPAL =====
        this._contenedor.className = 'chat-container';
        this._contenedorMensajes.className = 'messages-container';

        // ===== INPUT Y BOTÓN =====
        var inputArea = document.createElement('div');
        inputArea.className = 'input-area';
        inputArea.appendChild(this._input);
        inputArea.appendChild(this._btnEnviar);

        // ===== ENSAMBLAR =====
        this._contenedor.appendChild(this._contenedorMensajes);
        this._contenedor.appendChild(inputArea);
        this.shadowRoot.appendChild(this._contenedor);

        // ===== BIND DE MÉTODOS =====
        this._handleSend = this._handleSend.bind(this);
        this._handleKeyPress = this._handleKeyPress.bind(this);
        this.addMessage = this.addMessage.bind(this);
        this.getMessages = this.getMessages.bind(this);
        this.clearMessages = this.clearMessages.bind(this);

        // Mensaje de bienvenida
        this.addMessage('¡Bienvenido al chat!', false);
        this.addMessage('Escribe un mensaje para empezar.', false);
    }

    // ===== CONNECTED =====
    connectedCallback() {
        this._btnEnviar.addEventListener('click', this._handleSend);
        this._input.addEventListener('keypress', this._handleKeyPress);
    }

    // ===== DISCONNECTED =====
    disconnectedCallback() {
        this._btnEnviar.removeEventListener('click', this._handleSend);
        this._input.removeEventListener('keypress', this._handleKeyPress);
    }

    // ===== MANEJADOR DE ENVÍO =====
    _handleSend() {
        var mensaje = this._input.value.trim();
        if (mensaje === '') return;

        // Agregar mensaje propio
        this.addMessage(mensaje, true);
        this._input.value = '';

        // Respuesta automática
        var self = this;
        setTimeout(function() {
            var respuesta = self._respuestas[self._indexRespuesta % self._respuestas.length];
            self._indexRespuesta++;
            self.addMessage(respuesta, false);
        }, 500);
    }

    // ===== MANEJADOR DE TECLA ENTER =====
    _handleKeyPress(event) {
        if (event.key === 'Enter') {
            event.preventDefault();
            this._handleSend();
        }
    }

    // ===== MÉTODO PÚBLICO: AGREGAR MENSAJE =====
    addMessage(texto, esPropio) {
        if (!texto || typeof texto !== 'string') {
            console.error('addMessage: el mensaje debe ser un texto válido');
            return;
        }

        var mensaje = document.createElement('p');
        mensaje.textContent = texto;
        mensaje.className = 'message' + (esPropio ? ' own' : ' other');

        this._contenedorMensajes.appendChild(mensaje);
        this._mensajes.push({ texto: texto, esPropio: esPropio });

        // Scroll al final
        this._contenedorMensajes.scrollTop = this._contenedorMensajes.scrollHeight;
    }

    // ===== MÉTODO PÚBLICO: OBTENER MENSAJES =====
    getMessages() {
        return this._mensajes;
    }

    // ===== MÉTODO PÚBLICO: LIMPIAR MENSAJES =====
    clearMessages() {
        while (this._contenedorMensajes.firstChild) {
            this._contenedorMensajes.removeChild(this._contenedorMensajes.firstChild);
        }
        this._mensajes = [];
        this._indexRespuesta = 0;
    }
}

// ===== REGISTRAR COMPONENTE =====
customElements.define('x-chat', Chat);

// ===== CREAR INSTANCIA =====
function main() {
    var myChat = new Chat();
    document.body.appendChild(myChat);

    console.log(' Chat WebComponent cargado');
    console.log(' Métodos:');
    console.log('  - addMessage(texto, esPropio) : Agregar mensaje');
    console.log('  - getMessages() : Obtener todos los mensajes');
    console.log('  - clearMessages() : Limpiar todos los mensajes');
    console.log('');
    console.log(' Prueba desde consola:');
    console.log('  var chat = document.querySelector("x-chat")');
    console.log('  chat.addMessage("Hola mundo", true)');
    console.log('  chat.getMessages()');
}

window.onload = main;
</script>
</html>
