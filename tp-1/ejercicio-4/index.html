<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
</head>
<body>   
</body>
<script>

class chat extends HTMLElement {
    constructor() {
        super();
        
        // ===== ELEMENTOS =====
        this.input = document.createElement('input');
        this.bntenviar = document.createElement('button');
        this.contenedor = document.createElement('div');
        this.contenedorMensajes = document.createElement('div');
        this.indexRespuesta = 0;

        // ===== CONFIGURACIÓN =====
        this.input.type = 'text';
        this.input.placeholder = 'Escribe un mensaje...';
        this.bntenviar.textContent = '→';

        // ===== RESPUESTAS AUTOMÁTICAS =====
        this.respuestas = [
            '¡Hola! ¿Cómo estás?',
            'Todo bien por acá, ¿y vos?',
            'Me alegra escuchar eso.',
            '¿Qué estás haciendo?',
            'Suena interesante, cuéntame más.',
            '¡Qué buena idea!',
            'No sabía eso, gracias por contarme.',
            'Jaja, me hiciste reír.',
            '¿Viste la última película?',
            'Tengo que irme, hablamos luego.'
        ];

        // ===== AGREGAR AL DOM =====
        this.appendChild(this.contenedor);
        this.contenedor.appendChild(this.contenedorMensajes);
        this.contenedor.appendChild(this.input);
        this.contenedor.appendChild(this.bntenviar);

        // ===== ESTILOS =====
        // Input
        this.input.style.padding = '10px';
        this.input.style.borderRadius = '20px';
        this.input.style.border = 'none';
        this.input.style.outline = 'none';
        this.input.style.marginTop = '10px';
        this.input.style.flex = '1';
        this.input.style.fontSize = '14px';

        // Botón enviar
        this.bntenviar.style.marginTop = '10px';
        this.bntenviar.style.padding = '10px 18px';
        this.bntenviar.style.border = 'none';
        this.bntenviar.style.borderRadius = '20px';
        this.bntenviar.style.backgroundColor = '#128C7E';
        this.bntenviar.style.color = 'white';
        this.bntenviar.style.cursor = 'pointer';
        this.bntenviar.style.fontSize = '18px';

        // Contenedor principal
        this.contenedor.style.width = '400px';
        this.contenedor.style.margin = '30px auto';
        this.contenedor.style.border = '1px solid #ccc';
        this.contenedor.style.borderRadius = '10px';
        this.contenedor.style.padding = '10px';
        this.contenedor.style.backgroundColor = '#ece5dd';
        this.contenedor.style.display = 'flex';
        this.contenedor.style.flexDirection = 'column';

        // Contenedor de mensajes
        this.contenedorMensajes.style.height = '400px';
        this.contenedorMensajes.style.overflowY = 'auto';
        this.contenedorMensajes.style.display = 'flex';
        this.contenedorMensajes.style.flexDirection = 'column';
        this.contenedorMensajes.style.gap = '10px';
        this.contenedorMensajes.style.padding = '5px';
    }

    // ===== ENVIAR MENSAJE =====
    sendMessage() {
        var mensaje = this.input.value.trim();
        if (mensaje === '') return;

        // Crear mensaje propio
        var p = document.createElement('p');
        p.textContent = mensaje;
        this.contenedorMensajes.appendChild(p);
        
        // Estilo mensaje propio
        p.style.padding = '10px 14px';
        p.style.borderRadius = '10px';
        p.style.maxWidth = '70%';
        p.style.alignSelf = 'flex-end';
        p.style.backgroundColor = '#DCF8C6';
        p.style.margin = '0';
        p.style.wordWrap = 'break-word';

        // Limpiar input
        this.input.value = '';

        // Respuesta automática
        this.receiveMessage();

        // Scroll al final
        this.contenedorMensajes.scrollTop = this.contenedorMensajes.scrollHeight;
    }

    // ===== RESPUESTA AUTOMÁTICA =====
    receiveMessage() {
        var respuestaBot = this.respuestas[this.indexRespuesta % this.respuestas.length];
        this.indexRespuesta++;

        var respuestaP = document.createElement('p');
        respuestaP.textContent = respuestaBot;
        this.contenedorMensajes.appendChild(respuestaP);

        // Estilo mensaje de bot
        respuestaP.style.padding = '10px 14px';
        respuestaP.style.borderRadius = '10px';
        respuestaP.style.maxWidth = '70%';
        respuestaP.style.alignSelf = 'flex-start';
        respuestaP.style.backgroundColor = 'white';
        respuestaP.style.margin = '0';
        respuestaP.style.wordWrap = 'break-word';

        // Scroll al final
        this.contenedorMensajes.scrollTop = this.contenedorMensajes.scrollHeight;
    }

    // ===== CONNECTED CALLBACK =====
    connectedCallback() {
        // Asignar evento al botón
        this.bntenviar.onclick = this.sendMessage.bind(this);

        // Asignar evento Enter al input
        this.input.onkeypress = function(event) {
            if (event.key === 'Enter') {
                this.sendMessage();
            }
        }.bind(this);
    }

    // ===== DISCONNECTED CALLBACK =====
    disconnectedCallback() {
        this.bntenviar.onclick = null;
        this.input.onkeypress = null;
    }

}

// ===== REGISTRAR COMPONENTE =====
customElements.define('x-chat', chat);

// ===== CREAR INSTANCIA =====
function main() {
    var myChat = new chat();
    document.body.appendChild(myChat);

    // Mensaje de bienvenida
    myChat.addMessage('¡Bienvenido al chat! ', false);
    myChat.addMessage('Escribe un mensaje para empezar.', false);

    console.log(' Chat WebComponent cargado');
    console.log(' Métodos:');
    console.log('  - addMessage(texto, esPropio)');
    console.log('  - getMessages()');
    console.log('  - clearMessages()');
}

window.onload = main;
</script>
</html>
