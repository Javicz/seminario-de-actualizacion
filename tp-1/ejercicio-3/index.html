<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test - Graphic Equalizer</title>
  <script src="GraphicEqualizer.js" defer></script>
</head>
<body style="background-color: #3e3e3e; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">

  <graphic-equalizer id="miEcualizador"></graphic-equalizer>

  <script type="text/javascript">
    window.addEventListener('DOMContentLoaded', function() {
      const eq = document.getElementById('miEcualizador');

      // Simulación de respuesta asíncrona: pasados 3 segundos mutamos mediante setData()
      setTimeout(function() {
        console.log("Cargando Preset de ecualización externa mediante setData()...");
        
        eq.setData({
          preset: 'Rock Classic',
          bands: [
            { frequency: '32Hz', db: 5.5 },
            { frequency: '64Hz', db: 4 },
            { frequency: '130Hz', db: -1 },
            { frequency: '260Hz', db: -3.5 },
            { frequency: '500Hz', db: -2 },
            { frequency: '1k', db: 0.5 },
            { frequency: '2k', db: 3 },
            { frequency: '4k', db: 4.5 },
            { frequency: '8.3k', db: 6 },
            { frequency: '16.5k', db: 5 }
          ]
        });

        // Comprobación de integridad de datos por consola
        console.log("getData() obtenido:", eq.getData());
      }, 3000);
    });
  </script>

</body>
</html>
