<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora Clásica</title>
  <style>
    /* Estilos de maquetación y contenedor general */
    body {
      background-color: #f1f5f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    table {
      background-color: #ffffff;
      border: 1px solid #cbd5e1;
      border-collapse: separate;
      border-spacing: 10px;
      border-radius: 12px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
      padding: 15px;
      width: 320px;
    }

    td {
      border: none;
    }

    /* Estilos del Display de visualización */
    #display {
      width: 100%;
      height: 55px;
      background-color: #f8fafc;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      box-sizing: border-box;
      padding: 0 15px;
      font-size: 24px;
      text-align: right;
      color: #1e293b;
      font-weight: 600;
    }

    /* Estilos generales para los botones estándar */
    button {
      width: 100%;
      height: 50px;
      font-size: 18px;
      font-weight: 600;
      font-family: inherit;
      color: #334155;
      background-color: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.15s ease, transform 0.05s ease;
    }

    button:hover {
      background-color: #e2e8f0;
    }

    button:active {
      transform: scale(0.96);
    }

    /* Estilos específicos para los operadores */
    #btnPlus, #btnMinus, #btnMultiply, #btnDivision {
      background-color: #ffedd5;
      color: #ea580c;
      border-color: #fed7aa;
    }

    #btnPlus:hover, #btnMinus:hover, #btnMultiply:hover, #btnDivision:hover {
      background-color: #fed7aa;
    }

    /* Estilo para el botón de ejecución de resultado */
    #btnResult {
      background-color: #dbeafe;
      color: #2563eb;
      border-color: #bfdbfe;
    }

    #btnResult:hover {
      background-color: #bfdbfe;
    }

    /* Botón de borrado general al estilo de la plantilla base */
    .btnDelete {
      color: white;
      font-family: inherit;
      font-weight: bold;
      font-size: 15px;
      background-color: #ef4444;
      border: 1px solid #dc2626;
      box-shadow: 0px 4px #b91c1c;
      width: 100%;
      height: 45px;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.05s ease, box-shadow 0.05s ease;
    }

    .btnDelete:hover {
      background-color: #dc2626;
    }

    .btnDelete:active {
      box-shadow: 0px 1px #b91c1c;
      transform: translateY(3px);
    }
  </style>
</head>
<body>

  <table>
    <tr>
      <td colspan="4">
        <input id="display" type="text" value="" disabled />
      </td>
    </tr>

    <tr>
      <td><button id="btn7">7</button></td>
      <td><button id="btn8">8</button></td>
      <td><button id="btn9">9</button></td>
      <td><button id="btnPlus">+</button></td>
    </tr>

    <tr>
      <td><button id="btn4">4</button></td>
      <td><button id="btn5">5</button></td>
      <td><button id="btn6">6</button></td>
      <td><button id="btnMinus">-</button></td>
    </tr>

    <tr>
      <td><button id="btn3">3</button></td>
      <td><button id="btn2">2</button></td>
      <td><button id="btn1">1</button></td>
      <td><button id="btnMultiply">*</button></td>
    </tr>

    <tr>
      <td><button id="btn0">0</button></td>
      <td><button id="btnDot">.</button></td>
      <td><button id="btnResult">=</button></td>
      <td><button id="btnDivision">/</button></td>
    </tr>

    <tr>
      <td colspan="4">
        <button id="btnDelete" class="btnDelete">Borrar</button>
      </td>
    </tr>
  </table>

  <script type="text/javascript">
    function main() {
      const display = document.getElementById('display');
      const table = document.querySelector('table');

      // Delegación de eventos con función tradicional anónima
      table.addEventListener('click', function (event) {
        const target = event.target;

        // Validamos que el elemento que recibió el click sea un botón
        if (target.tagName !== 'BUTTON') return;

        const id = target.id;
        const value = target.textContent;

        if (id === 'btnDelete') {
          display.value = '';
        } else if (id === 'btnResult') {
          if (display.value.trim() !== '') {
            try {
              const resultado = eval(display.value);
              display.value = (resultado === Infinity || isNaN(resultado)) ? 'Error' : resultado;
            } catch (error) {
              display.value = 'Error';
            }
          }
        } else {
          if (display.value === 'Error') {
            display.value = '';
          }
          display.value += value;
        }
      });
    }

    window.onload = main;
  </script>
</body>
</html>
